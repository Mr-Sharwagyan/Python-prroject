{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>
         MachhaBazaar
    </title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 4 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
          rel="stylesheet">

    <style>
        
    
        body {
            font-family: 'Poppins', sans-serif;
        }
        .logo {
            height: 60px;
            width:auto;
            object-fit: contain;
            background-color: transparent; /* important! */
        }
        .navbar a {
            white-space: nowrap; /* keeps the text in a single line */
        }


        .navbar {
            position: sticky;
            top: 12px;
            width: 94%;
            margin: auto;
            border-radius: 22px;
            background: rgba(30,30,35,0.75) !important;
            backdrop-filter: blur(18px);
            box-shadow: 0 18px 45px rgba(0,0,0,0.3);
            padding: 14px 24px;
            z-index: 1000;
        }
        .navbar {
            background-color: #4a4a4a !important; /* or whatever dark shade */
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }


        .navbar-brand {
            font-size: 1.6rem;
            font-weight: 900;
            color: #ffd166 !important;
            letter-spacing: 1px;
            text-shadow: 0 0 12px rgba(255,209,102,0.7);
        }

        .nav-link {
            color: #ffffff !important;
            font-weight: 600;
            margin: 0 10px;
            position: relative;
        }

        .nav-link::after {
            content: "";
            position: absolute;
            bottom: -6px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #ffd166, #ff9f1c);
            transition: 0.35s ease;
            transform: translateX(-50%);
        }

        .nav-link:hover::after {
            width: 100%;
        }
        
        .navbar .form-inline {
            display: flex !important;      
            flex-wrap: nowrap !important;  
            align-items: center !important;
            margin-left: auto;             
        }

        .navbar .form-inline .search-input {
            flex: 1 1 auto;                
            min-width: 180px;              
            max-width: 300px;              
            border-radius: 25px;
            height: 38px;
            white-space: nowrap;           
        }

        .navbar .form-inline button {
            flex-shrink: 0;                
            white-space: nowrap;           
        }
        .navbar .nav-link {
            font-family: 'Poppins', sans-serif; 
            font-size: 1rem;                    
            font-weight: 600;
            margin: 0 10px;
        }

  
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container d-flex align-items-center">

        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center " href="/">
            <img src="{% static 'images/fish-hero.png' %}" alt="MachhaBazaar" class="logo" >
            <span style="color: #ffe082; font-family: 'Poppins',sans-serif">MachhaBazaar</span>
        </a>

        <!-- Toggle -->
        <button class="navbar-toggler text-white" type="button"
                data-toggle="collapse" data-target="#navbarContent">
            ☰
        </button>

        <div class="collapse navbar-collapse align-items-center" id="navbarContent">

            <!-- Left -->
            <ul class="navbar-nav mr-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li>
                    <a class="nav-link" href="/offers">Offers</a>
                    <li>
                    <a class="nav-link" href="/about">About Us</a>
                </li>
                </li>
            </ul>

            <!-- Search -->
            <form class="form-inline align-items-center mr-3" action="/search">
                <input class="form-control search-input mr-2" name="query" 
                       type="search" placeholder="Search fish..." value="{{request.GET.query}}">
                <button class="btn btn-warning mr-3">Search</button>
            </form>

            <!-- Right -->
            <ul class="navbar-nav align-items-center">

                {% if request.session %}

                <li class="nav-item">
                    <a class="nav-link" href="/show_cart"><span class="badge btn-danger">{{totalitem}}</span> Cart</a>
                </li>

                <!-- User Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle"
                       href="#"
                       id="userDropdown"
                       role="button"
                       data-toggle="dropdown">
                        {{name}}
                    </a>

                    <div class="dropdown-menu dropdown-menu-right">
                        <a class="dropdown-item" href="/order"> Orders</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="/about"> Information</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item text-danger" href="/logout"> Logout</a>
                        
                    </div>
                </li>

                {% else %}

                <li class="nav-item">
                    <a class="nav-link" href="/login">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/signup">Sign Up</a>
                </li>

                {% endif %}

            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% block js %}{% endblock %}

</body>
</html>
