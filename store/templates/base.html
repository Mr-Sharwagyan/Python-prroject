{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>MachhaBazaar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 4 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
          rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        .navbar-custom {
            background: linear-gradient(90deg, gray);
            min-height: 70px;
        }

        .navbar-brand img {
            height: 45px;
            background: white;
            padding: 4px;
            border-radius: 6px;
        }

        .navbar-brand span {
            color: white;
            font-weight: 600;
            font-size: 20px;
            margin-left: 8px;
        }

        .nav-link {
            color: white !important;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #ffe082 !important;
        }

        .search-input {
            border-radius: 25px;
            height: 38px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container d-flex align-items-center">

        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="{% static 'images/logo.png' %}" alt="MachhaBazaar">
            <span>MachhaBazaar</span>
        </a>

        <!-- Toggle -->
        <button class="navbar-toggler text-white" type="button"
                data-toggle="collapse" data-target="#navbarContent">
            ☰
        </button>

        <div class="collapse navbar-collapse align-items-center" id="navbarContent">

            <!-- Left -->
            <ul class="navbar-nav mr-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
            </ul>

            <!-- Search -->
            <form class="form-inline align-items-center mr-3">
                <input class="form-control search-input mr-2"
                       type="search" placeholder="Search fish...">
                <button class="btn btn-warning mr-3">Search</button>
            </form>

            <!-- Right -->
            <ul class="navbar-nav align-items-center">

                {% if request.session %}

                <li class="nav-item">
                    <a class="nav-link" href="/show_cart"><span class="badge btn-danger">{{totalitem}}</span> Cart</a>
                </li>

                <!-- User Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle"
                       href="#"
                       id="userDropdown"
                       role="button"
                       data-toggle="dropdown">
                        {{name}}
                    </a>

                    <div class="dropdown-menu dropdown-menu-right">
                        <a class="dropdown-item" href="#"> Orders</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item text-danger" href="/logout"> Logout</a>
                    </div>
                </li>

                {% else %}

                <li class="nav-item">
                    <a class="nav-link" href="/login">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/signup">Sign Up</a>
                </li>

                {% endif %}

            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.min.js"></script>

</body>
</html>
