{% extends 'base.html' %}
{% load static %}
{% block title %}My Cart{% endblock %}

{% block content %}

<style>
/* ===== GLOBAL ARTISTIC BACKGROUND ===== */
body {
    background: radial-gradient(circle at top left, #f1f5ff, #eaeef7);
    font-family: 'Segoe UI', system-ui, sans-serif;
}

/* ===== NAVBAR (FLOATING GLASS STYLE) ===== */
.navbar {
    position: sticky;
    top: 12px;
    width: 94%;
    margin: auto;
    border-radius: 22px;
    background: rgba(30,30,35,0.75) !important;
    backdrop-filter: blur(18px);
    box-shadow: 0 18px 45px rgba(0,0,0,0.3);
    padding: 14px 24px;
    z-index: 1000;
}

.navbar-brand {
    font-size: 1.6rem;
    font-weight: 900;
    color: #ffd166 !important;
    letter-spacing: 1px;
    text-shadow: 0 0 12px rgba(255,209,102,0.7);
}

.nav-link {
    color: #ffffff !important;
    font-weight: 600;
    margin: 0 10px;
    position: relative;
}

.nav-link::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 50%;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, #ffd166, #ff9f1c);
    transition: 0.35s ease;
    transform: translateX(-50%);
}

.nav-link:hover::after {
    width: 100%;
}

.navbar input,
.navbar button {
    border-radius: 18px;
}

/* ===== EMPTY CART CARD ===== */
.empty-cart {
    max-width: 600px;
    margin: 80px auto;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    border-radius: 22px;
    box-shadow: 0 18px 45px rgba(0,0,0,0.12);
    padding: 50px 30px;
    text-align: center;
    transition: 0.3s ease;
}

.empty-cart:hover {
    transform: translateY(-8px);
    box-shadow: 0 30px 60px rgba(0,0,0,0.15);
}

.empty-cart h3 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #1d3557;
    margin-bottom: 25px;
}

.empty-cart p {
    font-size: 1.1rem;
    color: #555;
    margin-bottom: 30px;
}

/* ===== BUTTON ===== */
.btn-continue {
    background-color: #28a745;
    color: #fff;
    font-weight: 600;
    padding: 12px 28px;
    border-radius: 18px;
    box-shadow: 0 12px 25px rgba(0,0,0,0.15);
    transition: 0.3s ease;
    text-decoration: none;
}

.btn-continue:hover {
    background-color: #218838;
    transform: translateY(-3px);
    box-shadow: 0 18px 30px rgba(0,0,0,0.2);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 576px) {
    .empty-cart {
        padding: 40px 20px;
    }
}
</style>

<div class="container">
    <div class="empty-cart">
        <h3>🐟 Your cart is empty!</h3>
        <p>Looks like you haven’t added any products yet. Start exploring and add some to your cart.</p>
        <a href="{% url 'homepage' %}" class="btn-continue">Continue Shopping</a>
    </div>
</div>

{% endblock %}
