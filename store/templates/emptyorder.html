{% extends 'base.html' %}
{% load static %}
{% block title %}Empty Order{% endblock %}

{% block content %}

<style>
/* ===== GLOBAL ARTISTIC BACKGROUND ===== */
body {
    background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    font-family: 'Segoe UI', system-ui, sans-serif;
}

/* ===== NAVBAR (FLOATING GLASS STYLE) ===== */
.navbar {
    position: sticky;
    top: 12px;
    width: 94%;
    margin: auto;
    border-radius: 22px;
    background: rgba(30,30,35,0.75);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    padding: 14px 24px;
    z-index: 1000;
}

.navbar-brand {
    font-size: 1.7rem;
    font-weight: 900;
    color: #ffb74d !important;
    letter-spacing: 1px;
    text-shadow: 0 0 15px rgba(255,183,77,0.7);
}

.nav-link {
    color: #ffffff !important;
    font-weight: 600;
    margin: 0 12px;
    position: relative;
}

.nav-link::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 50%;
    width: 0;
    height: 3px;
    background: linear-gradient(90deg, #ffb74d, #ff9800);
    transition: 0.35s ease;
    transform: translateX(-50%);
}

.nav-link:hover::after {
    width: 100%;
}

.navbar input,
.navbar button {
    border-radius: 20px;
}

/* ===== EMPTY ORDER CARD ===== */
.empty-order {
    max-width: 650px;
    margin: 100px auto;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(18px);
    border-radius: 25px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.15);
    padding: 60px 40px;
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.empty-order:hover {
    transform: translateY(-10px);
    box-shadow: 0 35px 70px rgba(0,0,0,0.2);
}

.empty-order h3 {
    font-size: 2rem;
    font-weight: 800;
    color: #162768;
    margin-bottom: 20px;
    animation: bounce 1.2s infinite alternate;
}

.empty-order p {
    font-size: 1.2rem;
    color: #555;
    margin-bottom: 35px;
    line-height: 1.6;
}

/* ===== BUTTON ===== */
.btn-continue {
    background: linear-gradient(90deg, rgb(211, 210, 145) );
    color: #de6060;
    font-weight: 700;
    padding: 14px 36px;
    border-radius: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    text-decoration: none;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.btn-continue:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 25px 50px rgba(0,0,0,0.25);
}

/* ===== ANIMATION ===== */
@keyframes bounce {
    0% { transform: translateY(0px); }
    100% { transform: translateY(-8px); }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 576px) {
    .empty-order {
        padding: 40px 25px;
    }

    .empty-order h3 {
        font-size: 1.6rem;
    }

    .empty-order p {
        font-size: 1rem;
    }

    .btn-continue {
        padding: 12px 28px;
    }
}
</style>

<div class="container">
    <div class="empty-order">
        <h3>🐟 Your order list is empty!</h3>
        <p>Looks like you haven’t order any products yet. Start exploring and add some to your cart.</p>
        <a href="{% url 'homepage' %}" class="btn-continue">Continue Shopping</a>
    </div>
</div>

{% endblock %}
