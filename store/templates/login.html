{% extends 'base.html' %}
{% block title %}Customer LogIn{% endblock title %}
{% block content %}
<style>
/* ===== GLOBAL BACKGROUND ===== */
body {
    background: linear-gradient(135deg, #e0f7fa, #fff3e0);
    font-family: 'Segoe UI', system-ui, sans-serif;
}

/* ===== LOGIN CARD ===== */
.login-card {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
    backdrop-filter: blur(6px);
    transition: all 0.35s ease;
}

.login-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 28px 55px rgba(0, 0, 0, 0.25);
}

/* ===== TITLE ===== */
.login-title {
    color: #ff9800;
    font-family: 'Franklin Gothic Medium';
    letter-spacing: 1.2px;
    text-transform: uppercase;
}

/* ===== LABEL ===== */
.form-label {
    font-weight: 600;
    color: #37474f;
}

/* ===== INPUT FIELD ===== */
.form-control {
    border-radius: 12px;
    padding: 12px 16px;
    border: 1px solid #b0bec5;
    font-size: 15px;
}

.form-control::placeholder {
    color: #90a4ae;
}

.form-control:focus {
    border-color: #0dcaf0;
    box-shadow: 0 0 0 0.18rem rgba(13, 202, 240, 0.35);
}

/* ===== LOGIN BUTTON ===== */
.btn-info {
    background: linear-gradient(135deg, #0dcaf0, #0097a7);
    border: none;
    border-radius: 14px;
    padding: 12px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
}

.btn-info:hover {
    background: linear-gradient(135deg, #0097a7, #0dcaf0);
    transform: scale(1.03);
}

/* ===== ERROR ALERT ===== */
.alert-danger {
    border-radius: 12px;
    font-size: 14px;
}

/* ===== SIGNUP TEXT ===== */
.signup-text {
    margin-top: 18px;
}

.signup-text small {
    color: #455a64;
}

.signup-text a {
    color: #ff5722;
    font-weight: 700;
    text-decoration: none;
}

.signup-text a:hover {
    text-decoration: underline;
}
/* ===== SOCIAL LOGIN ===== */
.social-login {
    margin-top: 22px;
    text-align: center;
}

.social-login p {
    color: #546e7a;
    font-size: 14px;
    margin-bottom: 12px;
}

.social-icons {
    display: flex;
    justify-content: center;
    gap: 14px;
}

.social-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
    transition: all 0.3s ease;
    cursor: pointer;
}

.social-btn:hover {
    transform: translateY(-4px) scale(1.08);
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.facebook { background: #1877f2; }
.google { background: #ffffff; }
.twitter { background: #1da1f2; }

</style>


<div class="container">
    <div class="row my-5">
        <div class="col-sm-6 offset-sm-3">
            <h3 class="mb-4 text-center login-title">Customer Login</h3>

            <form action="/login" method="POST" class="login-card p-4">

                {% csrf_token %}
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    {{error}}
                </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label">Mobile Number</label>
                    <input type="text" name="phone" value="{{value.phone}}" class="form-control" placeholder="Enter mobile no.">
                </div>

                <button type="submit" class="btn btn-info w-100">
                    Log In
                </button>
                <div class="social-login">
                    <p>— Or Log in with —</p>
                    <div class="social-icons">
                        <a href="#" class="social-btn facebook" title="Sign up with Facebook">
                            <i class="fab fa-facebook-f"></i>
                        </a>
                        <a href="#" class="social-btn google" title="Sign up with Google">
                            <svg width="18" height="18" viewBox="0 0 533.5 544.3">
                                <path fill="#4285F4" d="M533.5 278.4c0-17.3-1.6-34-4.6-50.4H272v95.4h146.9c-6.3 33.6-25 62-53.1 81.1v67.3h85.8c50.1-46.2 79.9-114.1 79.9-193.4z"/>
                                <path fill="#34A853" d="M272 544.3c72.3 0 132.9-23.8 177.2-64.7l-85.8-67.3c-23.8 16-54.3 25.5-91.4 25.5-70.3 0-129.9-47.5-151.2-111.5h-89.5v69.9C76.7 474.5 167 544.3 272 544.3z"/>
                                <path fill="#FBBC05" d="M120.8 331.3c-5.3-16-8.3-33-8.3-50.3s3-34.3 8.3-50.3v-69.9h-89.5C16.8 198.5 0 243.8 0 278.4s16.8 79.9 31.3 118.6l89.5-65.7z"/>
                                <path fill="#EA4335" d="M272 107.7c38.8 0 73.6 13.4 101.1 39.6l75.6-75.6C404.9 24.8 344.3 0 272 0 167 0 76.7 69.8 31.3 174.4l89.5 69.9c21.3-64 80.9-111.5 151.2-111.5z"/>
                            </svg>
                        </a>

                        <a href="#" class="social-btn twitter" title="Sign up with Twitter">
                            <i class="fab fa-twitter"></i>
                        </a>
                    </div>
                </div>


                <div class="text-center text-primary fw-bold signup-text">
                    <small>Are you new user to MachhabazaaR?</small>
                    <a href="/signup" class="text-danger">Signup</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
