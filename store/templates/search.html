{% extends 'base.html' %}
{% block content %}

<style>
/* ===== GLOBAL ===== */
body {
    background: radial-gradient(circle at top left, #f1f5ff, #eaeef7);
    font-family: 'Segoe UI', system-ui, sans-serif;
}

/* ===== NAVBAR (FLOATING GLASS STYLE) ===== */
.navbar {
    position: sticky;
    top: 12px;
    width: 94%;
    margin: auto;
    border-radius: 22px;
    background: rgba(30,30,35,0.75) !important;
    backdrop-filter: blur(18px);
    box-shadow: 0 18px 45px rgba(0,0,0,0.3);
    padding: 14px 24px;
    z-index: 1000;
}

.navbar-brand {
    font-size: 1.6rem;
    font-weight: 900;
    color: #ffd166 !important;
    letter-spacing: 1px;
    text-shadow: 0 0 12px rgba(255,209,102,0.7);
}

.nav-link {
    color: #ffffff !important;
    font-weight: 600;
    margin: 0 10px;
    position: relative;
}

.nav-link::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 50%;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, #ffd166, #ff9f1c);
    transition: 0.35s ease;
    transform: translateX(-50%);
}

.nav-link:hover::after {
    width: 100%;
}

.navbar input,
.navbar button {
    border-radius: 18px;
}

/* ===== CATEGORY SIDEBAR ===== */
.list-group {
    background: linear-gradient(145deg, #ffffff, #e9ecf3);
    border-radius: 22px;
    padding: 14px;
    box-shadow: 0 18px 45px rgba(0,0,0,0.12);
}

.list-group-item {
    border: none;
    border-radius: 16px;
    margin-bottom: 10px;
    padding: 14px 20px;
    font-weight: 600;
    background: linear-gradient(135deg, #fdfbfb, #ebedee);
    transition: 0.35s ease;
}

.list-group-item:hover {
    transform: translateX(6px);
    color: #ff9f1c;
    box-shadow: 0 8px 22px rgba(255,159,28,0.35);
}

/* ===== PRODUCT GRID (3 PER ROW) ===== */
#product .row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
}

/* ===== PRODUCT CARD ===== */
.card {
    border: none;
    border-radius: 24px;
    overflow: hidden;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    box-shadow: 0 18px 45px rgba(0,0,0,0.12);
    transition: 0.45s ease;
}

.card:hover {
    transform: translateY(-12px) scale(1.03);
    box-shadow: 0 30px 60px rgba(0,0,0,0.2);
}

.card-img-top {
    height: 260px;
    object-fit: cover;
    transition: 0.5s ease;
}

.card:hover .card-img-top {
    transform: scale(1.12);
}

.card-body {
    text-align: center;
    padding: 18px;
    background: linear-gradient(180deg, #ffffff, #f6f7fb);
}

.card-title {
    font-size: 1.2rem;
    font-weight: 600;
    color: #1d3557;
}

.card-text {
    font-size: 1.1rem;
    font-weight: 600;
    color: #e63946;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 992px) {
    #product .row {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 576px) {
    #product .row {
        grid-template-columns: 1fr;
    }
}
</style>

<div class="container-fluid mt-4">
    <div class="row">
        <!-- Category Sidebar -->
        <div class="col-lg-2">
            <div class="list-group">
                <a href="/" class="list-group-item">All Products</a>
                {% for category in category %}
                <a href="/?category={{ category.id }}" class="list-group-item">
                    {{ category.name }}
                </a>
                {% endfor %}
            </div>
        </div>

        <!-- Products -->
        <div id="product" class="col-lg-10">
            <div class="row">

                {% for product in search %}
                <div class="card">
                    <a href="{% url 'product-detail' product.id %}" class="btn p-0">
                        <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.name }}">
                    </a>
                    <div class="card-body">
                        <h4 class="card-title">{{ product.name }}</h4>
                        <h6 class="card-text">Rs. {{ product.price }}</h6>
                    </div>
                </div>
                {% endfor %}

            </div>
        </div>

    </div>
</div>

{% endblock %}
